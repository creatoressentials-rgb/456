[build]
  command   = "npx @11ty/eleventy"
  publish   = "_site"

[build.environment]
  NODE_VERSION = "18"

# ── Netlify Identity redirect for CMS ──────────────────────────────
[[redirects]]
  from = "/admin"
  to   = "/admin/"
  status = 301

# ── Wix URL → new URL redirects ───────────────────────────────────
[[redirects]]
  from   = "/services/youtube-consulting"
  to     = "/services/youtube-consulting/"
  status = 301

[[redirects]]
  from   = "/services/youtube-coaching-program"
  to     = "/services/youtube-coaching-program/"
  status = 301

[[redirects]]
  from   = "/services/youtube-channel-management"
  to     = "/services/youtube-channel-management/"
  status = 301

[[redirects]]
  from   = "/products/youtube-channel-audit"
  to     = "/services/youtube-channel-audit/"
  status = 301

[[redirects]]
  from   = "/products/youtube-channel-video-seo"
  to     = "/products/youtube-seo/"
  status = 301

[[redirects]]
  from   = "/products/youtube-channel-creation-service"
  to     = "/products/youtube-channel-creation/"
  status = 301

[[redirects]]
  from   = "/products/youtube-competitor-analysis"
  to     = "/services/"
  status = 301

[[redirects]]
  from   = "/products/playlist-creation"
  to     = "/services/"
  status = 301

[[redirects]]
  from   = "/plans-pricing"
  to     = "/services/"
  status = 301

[[redirects]]
  from   = "/blogs"
  to     = "/blog/"
  status = 301

[[redirects]]
  from   = "/resources"
  to     = "/blog/"
  status = 301

[[redirects]]
  from   = "/resources/free-guides"
  to     = "/blog/"
  status = 301

[[redirects]]
  from   = "/book-online"
  to     = "/contact/"
  status = 301

[[redirects]]
  from   = "/who-we-serve"
  to     = "/about/"
  status = 301

[[redirects]]
  from   = "/who-we-serve/*"
  to     = "/about/"
  status = 301

[[redirects]]
  from   = "/tools"
  to     = "/blog/"
  status = 301

[[redirects]]
  from   = "/sitemap"
  to     = "/"
  status = 301

# ── Security Headers ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.netlify.com https://identity.netlify.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
